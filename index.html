<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5F4F0">
<title>In the Word — TPC 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', -apple-system, sans-serif;
  --bg: #F5F4F0;
  --card: #FFFFFF;
  --text: #1A1A18;
  --sub: #7A776E;
  --faint: #B0ADA5;
  --line: #E8E6E1;
  --green: #4A7C59;
  --green-light: #E8F0EA;
  --green-soft: #D4E4D8;
  --gold: #D4A843;
  --gold-light: #FFF8E7;
  --warm: #F9F3E8;
  --blue-light: #E4EEF5;
  --peach: #F5EBE0;
  --dark: #1A1A18;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;}
button{font-family:var(--sans);cursor:pointer;}

/* ─── HEADER ─── */
.header{padding:28px 20px 20px;position:sticky;top:0;z-index:100;background:var(--bg);}
.header-inner{max-width:560px;margin:0 auto;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.header h1{font-family:var(--serif);font-size:28px;font-weight:400;letter-spacing:-0.01em;line-height:1.1;}
.header .tag{font-size:11px;font-weight:600;color:var(--sub);letter-spacing:0.05em;text-transform:uppercase;background:var(--card);padding:5px 10px;border-radius:20px;border:1px solid var(--line);}

/* Progress card */
.progress-card{background:var(--card);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;border:1px solid var(--line);}
.progress-ring{position:relative;width:48px;height:48px;flex-shrink:0;}
.progress-ring svg{transform:rotate(-90deg);}
.progress-ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--green);}
.progress-meta{flex:1;}
.progress-meta .label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.progress-meta .detail{font-size:12px;color:var(--sub);}

/* ─── CONTENT ─── */
.content{max-width:560px;margin:0 auto;padding:0 20px;}

/* Toolbar */
.tools{padding:16px 0;display:flex;gap:8px;flex-wrap:wrap;}
.chip{font-size:12px;font-weight:600;padding:8px 14px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--text);transition:all 0.15s;}
.chip:hover{background:var(--bg);border-color:#ccc;}
.chip-green{border:none;background:var(--green);color:#fff;}
.chip-green:hover{background:var(--green);opacity:0.9;}
.chip-ghost{border:none;background:none;color:var(--sub);text-decoration:underline;font-weight:500;padding:8px 10px;}
.sel-info{font-size:12px;color:var(--sub);padding:0 0 12px;font-style:italic;}

/* ─── SUMMARY CARD ─── */
.summary-card{background:var(--warm);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
.summary-card h3{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:4px;}
.summary-sub{font-size:13px;color:var(--sub);margin-bottom:16px;}
.summary-head{display:flex;align-items:baseline;justify-content:space-between;}
.summary-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:6px;}
.summary-book{font-family:var(--serif);font-size:16px;flex-shrink:0;}
.summary-refs{font-size:12px;color:var(--sub);flex:1;min-width:0;word-break:break-word;}
.listen-chip{font-size:11px;font-weight:600;padding:6px 12px;border-radius:20px;background:var(--green);color:#fff;border:none;display:flex;align-items:center;gap:4px;flex-shrink:0;transition:opacity 0.15s;}
.listen-chip:hover{opacity:0.85;}
.summary-footer{font-size:11px;color:var(--faint);margin-top:14px;}

/* ─── MONTH NAV ─── */
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0 14px;}
.month-nav h2{font-family:var(--serif);font-size:24px;font-weight:400;}
.month-btn{font-size:20px;border:none;background:var(--card);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text);border:1px solid var(--line);transition:all 0.15s;}
.month-btn:hover{background:var(--line);}
.month-btn:disabled{color:var(--line);border-color:transparent;background:none;cursor:default;}

/* ─── DAY LIST ─── */
.day{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;margin-bottom:4px;border-radius:var(--radius-sm);border:1.5px solid transparent;transition:all 0.12s;}
.day.today{background:var(--gold-light);border-color:#E8DFC0;}
.day.selected{background:var(--green-light);}
.day.bound{border-color:var(--green);}
.day.now-playing{background:var(--blue-light);}
.day:hover{background:var(--card);}

.cb{width:22px;height:22px;min-width:22px;border-radius:6px;border:1.5px solid #C8C5BC;background:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;padding:0;transition:all 0.12s;}
.cb.done{border:none;background:var(--green);}

.day-body{flex:1;min-width:0;cursor:pointer;}
.day-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;}
.day-num{font-size:12px;font-weight:700;color:var(--faint);min-width:22px;font-variant-numeric:tabular-nums;}
.day-badge{font-size:9px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;background:rgba(212,168,67,0.15);padding:2px 7px;border-radius:10px;}
.day-text{font-size:14px;line-height:1.5;color:var(--text);font-weight:400;letter-spacing:0.01em;}
.day-text.done{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--line);}

.play-btn{border:none;background:var(--green-light);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0;transition:all 0.15s;padding:0;}
.play-btn:hover{background:var(--green-soft);}

/* ─── STICKY PLAYER ─── */
.player{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--dark);color:#fff;padding:0 0 env(safe-area-inset-bottom,0px);box-shadow:0 -2px 24px rgba(0,0,0,0.2);}
.player-inner{max-width:560px;margin:0 auto;padding:14px 20px 16px;}
.player-row{display:flex;align-items:center;gap:12px;}
.player-btn{width:44px;height:44px;border-radius:50%;border:none;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:opacity 0.15s;}
.player-btn:hover{opacity:0.85;}
.player-btn.err{background:#555;}
.player-info{flex:1;min-width:0;}
.player-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-progress{display:flex;align-items:center;gap:8px;margin-top:6px;}
.player-time{font-size:11px;color:#888;font-variant-numeric:tabular-nums;min-width:34px;}
.player-bar{flex:1;height:4px;background:#333;border-radius:2px;cursor:pointer;position:relative;overflow:hidden;}
.player-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.15s linear;}
.player-err{font-size:12px;margin-top:4px;}
.player-err span{color:#E88;}
.player-err a{color:#8CB892;text-decoration:underline;}
.player-skip,.player-close{border:none;background:none;color:#777;cursor:pointer;padding:4px;flex-shrink:0;font-size:18px;}
.player-close{font-size:16px;}
.player-queue{font-size:11px;color:#555;margin-top:6px;padding-left:56px;}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:200;white-space:nowrap;}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.shimmer{position:absolute;top:0;left:0;right:0;height:100%;background:linear-gradient(90deg,transparent,rgba(74,124,89,0.4),transparent);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:2px;}
.spinner{animation:spin 1s linear infinite;}
</style>
</head>

function ti(){const n=new Date();return PLAN.findIndex(p=>p.m===n.getMonth()+1&&p.d===n.getDate());}

// Audio
function loadTrack(t){S.aCur=t;S.aState="loading";S.aErr=null;S.aProg=0;S.aDur=0;A.src=`/audio?q=${encodeURIComponent(t.query)}`;A.load();render();}
A.oncanplay=function(){A.play().catch(e=>{S.aErr="Playback blocked";S.aState="error";render();});};
A.onplay=function(){S.aState="playing";render();};
A.onpause=function(){if(!A.ended){S.aState="paused";render();}};
A.ontimeupdate=function(){S.aProg=A.currentTime;updProg();};
A.onloadedmetadata=function(){S.aDur=A.duration;render();};
A.onerror=function(){S.aErr="Could not load audio.";S.aState="error";render();};
A.onended=function(){if(qR.length>0){const[n,...r]=qR;qR=r;S.aQueue=r;loadTrack(n);}else{S.aState="idle";S.aCur=null;render();}};
function playTracks(t){if(!t.length)return;const[f,...r]=t;qR=r;S.aQueue=r;loadTrack(f);}
function toggleA(){A.paused?A.play():A.pause();}
function skipT(){if(qR.length>0){const[n,...r]=qR;qR=r;S.aQueue=r;loadTrack(n);}else stopA();}
function stopA(){A.pause();A.removeAttribute("src");A.load();qR=[];S.aCur=null;S.aQueue=[];S.aState="idle";S.aErr=null;S.aProg=0;S.aDur=0;render();}
function seekA(e){const r=e.currentTarget.getBoundingClientRect();if(S.aDur>0)A.currentTime=(e.clientX-r.left)/r.width*S.aDur;}
function updProg(){const f=document.getElementById("pf");const t=document.getElementById("pt");if(f&&S.aDur>0)f.style.width=`${(S.aProg/S.aDur)*100}%`;if(t)t.textContent=fmt(S.aProg);}

// Actions
function toggleDay(i){S.completed[i]?delete S.completed[i]:(S.completed[i]=true);save();render();}
function handleSel(i){if(S.selS===null){S.selS=i;S.selE=null;S.showSum=false;}else if(S.selE===null){const a=Math.min(S.selS,i),b=Math.max(S.selS,i);S.selS=a;S.selE=b;}else{S.selS=i;S.selE=null;S.showSum=false;}render();}
function selToday(){const t=ti();if(t>=0){S.selS=0;S.selE=t;S.showSum=false;render();}}
function markRange(){if(S.selS===null)return;const e=S.selE??S.selS,s=Math.min(S.selS,e),end=Math.max(S.selS,e);for(let i=s;i<=end;i++)S.completed[i]=true;save();render();}
function clearSel(){S.selS=null;S.selE=null;S.showSum=false;render();}
function showSum(){S.showSum=true;render();setTimeout(()=>{const el=document.getElementById("sum");if(el)el.scrollIntoView({behavior:"smooth"});},50);}
function setMo(m){S.mo=m;render();}
function getUnread(){if(S.selS===null)return[];const e=S.selE??S.selS,s=Math.min(S.selS,e),end=Math.max(S.selS,e);return PLAN.slice(s,end+1).filter((_,i)=>!S.completed[s+i]);}

// Icons
const ic={play:`<svg width="10" height="12" viewBox="0 0 10 12"><polygon points="1,0 10,6 1,12" fill="#4A7C59"/></svg>`,playW:`<svg width="8" height="10" viewBox="0 0 8 10"><polygon points="0,0 8,5 0,10" fill="#fff"/></svg>`,check:`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,pause:`<svg width="14" height="14" viewBox="0 0 14 14" fill="#fff"><rect x="2" y="1" width="3.5" height="12" rx="1"/><rect x="8.5" y="1" width="3.5" height="12" rx="1"/></svg>`,playLg:`<svg width="14" height="14" viewBox="0 0 14 14" fill="#fff"><polygon points="3,1 13,7 3,13"/></svg>`,spin:`<svg width="18" height="18" viewBox="0 0 18 18" class="spinner"><circle cx="9" cy="9" r="7" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="32" stroke-dashoffset="10"/></svg>`};

function render(){
  const t=ti(),unread=getUnread(),selCt=S.selE!==null?S.selE-S.selS+1:(S.selS!==null?1:0);
  const mD=PLAN.map((p,i)=>({...p,idx:i})).filter(p=>p.m===S.mo+1);
  const cc=Object.keys(S.completed).length,pct=((cc/PLAN.length)*100),summary=S.showSum&&unread.length?buildSummary(unread):[];
  const pv=S.aState!=="idle";
  // Progress ring
  const circ=2*Math.PI*19,offset=circ-(pct/100)*circ;

  let h=`<div class="header"><div class="header-inner">
    <div class="header-top"><h1>In the Word</h1><span class="tag">TPC 2026</span></div>
    <div class="progress-card">
      <div class="progress-ring">
        <svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="19" fill="none" stroke="#E8E6E1" stroke-width="4"/><circle cx="24" cy="24" r="19" fill="none" stroke="#4A7C59" stroke-width="4" stroke-linecap="round" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/></svg>
        <span class="pct">${Math.round(pct)}%</span>
      </div>
      <div class="progress-meta"><div class="label">${cc} of ${PLAN.length} days complete</div><div class="detail">${PLAN.length-cc} remaining</div></div>
    </div>
  </div></div><div class="content">
    <div class="tools">
      <button class="chip" onclick="selToday()">Select through today</button>`;
  if(S.selS!==null){
    h+=`<button class="chip chip-green" onclick="showSum()">Catch-up summary</button>
    <button class="chip" onclick="markRange()">Mark all complete</button>
    <button class="chip chip-ghost" onclick="clearSel()">Clear</button>`;
  }
  h+=`</div>`;
  if(S.selS!==null)h+=`<p class="sel-info">${S.selE!==null?`${selCt} days selected · ${unread.length} unread`:"Tap another day to complete the range"}</p>`;

  if(summary.length){
    h+=`<div class="summary-card" id="sum"><div class="summary-head"><h3>Catch-up reading</h3>
      <button class="listen-chip" onclick="playAllUnread()">${ic.playW} Listen to all</button></div>
      <p class="summary-sub">${unread.length} unread days, consolidated by book</p>`;
    for(const{book,refs}of summary){
      h+=`<div class="summary-row"><span class="summary-book">${book}</span><span class="summary-refs">${refs.join(", ")}</span>
        <button class="listen-chip" onclick="playBook('${book.replace(/'/g,"\\'")}',${JSON.stringify(refs).replace(/"/g,'&quot;')})">${ic.playW} Listen</button></div>`;
    }
    h+=`<p class="summary-footer">ESV audio by David Cochran Heath · Crossway</p></div>`;
  }

  h+=`<div class="month-nav">
    <button class="month-btn" ${S.mo===0?"disabled":""} onclick="setMo(${S.mo-1})">←</button>
    <h2>${MONTHS[S.mo]}</h2>
    <button class="month-btn" ${S.mo===11?"disabled":""} onclick="setMo(${S.mo+1})">→</button></div>`;

  h+=`<div style="padding-bottom:${pv?130:32}px">`;
  for(const{d,r,idx}of mD){
    const done=!!S.completed[idx],today=idx===t;
    const sel=S.selS!==null&&idx>=Math.min(S.selS,S.selE??S.selS)&&idx<=Math.max(S.selS,S.selE??S.selS);
    const bnd=idx===S.selS||idx===S.selE;
    let cls="day";if(today)cls+=" today";if(sel)cls+=" selected";if(bnd)cls+=" bound";
    h+=`<div class="${cls}">
      <button class="cb${done?" done":""}" onclick="event.stopPropagation();toggleDay(${idx})">${done?ic.check:""}</button>
      <div class="day-body" onclick="handleSel(${idx})">
        <div class="day-meta"><span class="day-num">${String(d).padStart(2,"0")}</span>${today?'<span class="day-badge">Today</span>':""}</div>
        <p class="day-text${done?" done":""}">${r}</p>
      </div>
      <button class="play-btn" onclick="event.stopPropagation();playDay('${r.replace(/'/g,"\\'")}')" title="Listen">${ic.play}</button>
    </div>`;
  }
  h+=`</div></div>`;

  if(pv){
    const isErr=S.aState==="error";
    h+=`<div class="player"><div class="player-inner"><div class="player-row">
      <button class="player-btn${isErr?" err":""}" onclick="${isErr?"stopA()":"toggleA()"}">
        ${S.aState==="loading"?ic.spin:S.aState==="playing"?ic.pause:isErr?"<span style='font-size:16px'>✕</span>":ic.playLg}
      </button><div class="player-info">
        <div class="player-title">${S.aState==="loading"?`Loading ${S.aCur?.label||""}...`:S.aCur?.label||""}</div>
        ${isErr?`<div class="player-err"><span>${S.aErr} </span><a href="${esvUrl(S.aCur?.query||"")}" target="_blank">Open on ESV.org</a></div>`
        :`<div class="player-progress"><span class="player-time" id="pt">${fmt(S.aProg)}</span><div class="player-bar" onclick="seekA(event)"><div class="player-fill" id="pf" style="width:${S.aDur>0?(S.aProg/S.aDur)*100:0}%"></div>${S.aState==="loading"?'<div class="shimmer"></div>':""}</div><span class="player-time" style="text-align:right">${fmt(S.aDur)}</span></div>`}
      </div>${S.aQueue.length>0?'<button class="player-skip" onclick="skipT()">⏭</button>':""}<button class="player-close" onclick="stopA()">✕</button>
    </div>${S.aQueue.length>0&&!isErr?`<div class="player-queue">Up next: ${S.aQueue[0].label}${S.aQueue.length>1?` + ${S.aQueue.length-1} more`:""}</div>`:""}</div></div>`;
  }

  if(S.selS!==null&&S.selE===null&&!pv)h+=`<div class="toast">Tap another day to complete the range</div>`;
  document.getElementById("app").innerHTML=h;
}

window.playDay=function(r){playTracks(dayTracks(r));};
window.playBook=function(b,refs){playTracks(refs.map(r=>({label:`${b} ${r}`,query:`${b} ${r}`})));};
window.playAllUnread=function(){const t=[];for(const d of getUnread())t.push(...dayTracks(d.r));playTracks(t);};
render();
</script>
</body>
</html>
